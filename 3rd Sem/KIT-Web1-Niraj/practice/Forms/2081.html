   <h4>8.a. Write a HTML to design following registration form:</h4>
     <form action="/form" method="post" target="_blank">
        <h4><u>Student Form</u></h4>

        <label for="name">Name:</label>
        <input type="text " id="name" >
        <br>
        <label for="roll">Roll No.:</label>
        <input type="number" id="roll">
        <br>
        <label for="year">Year:</label>
        <input type="number" id="year">
        <br>
        <label for="fac">Faculty:</label>
        <input type="text " id="fac">
        <br>
        <label for="email" >Email:</label>
        <input type="email" name="email" id="email">
        <br>
        <input type="submit" value="Submit">
        <input type="reset" value="Exit">


     </form>

     <h1>by using table method</h1>

     <table>
        <caption> <u>Student Form </u></caption>
        <form action="/fomr" method="post">
            <tr>
                <td><label for="name">Name:</label></td>
                <td> <input type="text " id="name" ></td>
            </tr>
            <tr>
                <td> <label for="roll">Roll No.:</label></td>
                <td><input type="number" id="roll"></td>
            </tr>
            <tr>
                <td><label for="year">Year:</label></td>
                <td> <input type="number" id="year"></td>
            </tr>
            <tr>
                <td> <label for="fac">Faculty:</label></td>
                <td> <input type="text " id="fac"></td>
            </tr>
            <tr>
                <td><label for="email" >Email:</label></td>
                <td><input type="email" name="email" id="email"></td>
            </tr>
            <tr>
                <td>  <input type="submit" value="Submit"></td>
                <td><input type="reset" value="Exit"></td>
            </tr>
        </form>
     </table>
