<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css using style in html document</title>

<style>
    body{
        background-color: rgba(215, 230, 230, 0.953);
       background: #2A7B9B;
background: linear-gradient(294deg, rgba(42, 123, 155, 1) 0%, rgba(87, 199, 133, 1) 50%, rgba(237, 221, 83, 1) 100%);
    }
   h1{
    color: red;
    font-family: sans-serif;
    font-weight: 500;
    font-size: 20px;
   }
h2 {
    color: green;
    font-family: Impact, Haettenschweiler, 'Arial Narrow Bold';
    font-weight:200 ;
    font-size: 10px;
}

#id{
    text-align: center;
    background-color: beige;
    color: rgb(94, 255, 0);
    font-size: 30px;
}

.cls{
    text-align: right;
    background-color: azure;
    color: blue;
    font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman';
    font-size: 25px;
    font-weight: 500;

}

p{
    font-size: 20px;
    color: rgb(67, 62, 214);
}
</style>

</head>
<body>
    <h1>CSS (cascading style sheet).</h1>
    <h2>CSS using Style tag</h2>

    <p>by using id and class</p>

    <h1 id="id">using id</h1>
    <h2 class="cls">by using class</h2>
</body>
</html>
