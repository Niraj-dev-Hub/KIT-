<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Nepal</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      background:#0b0f14;
      color:#f5f5f5;
    }

    /* HERO SECTION */
    .hero{
      position:relative;
      height:100vh;
      width:100%;
      overflow:hidden;
    }

    .hero video{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-2;
    }

    .overlay{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.55);
      z-index:-1;
    }

    .hero-content{
      height:100%;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
    }

    .hero-content h1{
      font-size:3rem;
      font-weight:700;
      margin-bottom:15px;
    }

    .hero-content p{
      max-width:650px;
      font-size:1.1rem;
      opacity:0.9;
      margin-bottom:30px;
    }

    .hero-content a{
      text-decoration:none;
      padding:12px 30px;
      border-radius:30px;
      background:#e63946;
      color:#fff;
      font-weight:600;
      transition:0.3s;
    }

    .hero-content a:hover{
      background:#ff4d5a;
    }

    /* SECTION STYLE */
    section{
      padding:70px 10%;
    }

    section h2{
      font-size:2.2rem;
      margin-bottom:20px;
      text-align:center;
    }

    section p{
      max-width:800px;
      margin:auto;
      text-align:center;
      opacity:0.85;
    }

    /* RESPONSIVE */
    @media(max-width:768px){
      .hero-content h1{
        font-size:2.2rem;
      }
    }
  </style>
</head>
<body>

  <!-- HERO WITH VIDEO BACKGROUND -->
  <div class="hero">
    <video autoplay muted loop playsinline>
      <source src="mountains.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>

    <div class="overlay"></div>

    <div class="hero-content">
      <h1>Our Nepal</h1>
      <p>Land of Himalayas, culture, peace and pride. Experience the real beauty of Nepal.</p>
      <a href="#about">Explore Nepal</a>
    </div>
  </div>

  <!-- ABOUT SECTION -->
  <section id="about">
    <h2>About Nepal</h2>
    <p>
      Nepal is a country of rich culture, ancient history and breathtaking natural beauty.
      From Mount Everest to Lumbini, Nepal connects nature and spirituality like no other place.
    </p>
  </section>

</body>
</html>
