<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>unorder list</title>
</head>
<body bgcolor="#afbcff">
   <h3>2.8.2. Unordered List: UL, LI, and UL <br>
    Attributes (TYPE- Disc, Circle, Square)
   </h3>


<ul >
<li>apple</li>
<li>ball</li>
<li>cat</li>
<li>dog</li>
<li>eye</li>
</ul>
<br>

<h3>Ul with attribute Type- circle</h3>
<ul type="circle" >
<li>apple</li>
<li>ball</li>
<li>cat</li>
<li>dog</li>
<li>eye</li>
</ul>
    <br>

<h3>Ul with attribute Type-square</h3>
<ul type="square" >
<li>apple</li>
<li>ball</li>
<li>cat</li>
<li>dog</li>
<li>eye</li>
</ul>


</body>
</html>
