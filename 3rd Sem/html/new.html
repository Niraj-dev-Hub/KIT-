<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table format</title>
</head>
<body>
<table align="center" border="1" cellspacing="10" cellpadding="15" width="100px" height="600px" bgcolor="brown">
        <caption>Tittle</caption>
        <tr>
            <th colspan="2">heading 1</th>
            <th rowspan="2">heading 2</th>
        </tr>
        <tr>
            <td>Data1</td>
            <td>data2</td>
        </tr>
        <tr>
            <td>anish</td>
            <td>nir</td>
        </tr>

    </table>
    
</body>
</html>
